# ═══════════════════════════════════════════════════════════════════════════
# PERF Environment Reference Configuration
# ═══════════════════════════════════════════════════════════════════════════
# Source of truth for Phase 3 (Env Triage) config validation.
# The env_config_checker agent compares live configs against this file.
#
# Maintenance:
#   - Update when environment topology changes
#   - All changes via pull request review
#   - Keep the Confluence mirror page in sync
#
# Format per application:
#   app_name:         Unique identifier matching the deployment name
#   app_description:  Human-readable description
#   tags:             Filtering labels
#   config_fields:    List of fields to check, each with:
#     field_name:           Config field identifier
#     expected_perf_value:  Correct PERF environment value
#     inspection_tool:      azure_cli | argocd_api | amdocs_api | http_probe | solace_semp | db_query
#     description:          What this field controls
#     known_qc_values:      Known QC values to flag
# ═══════════════════════════════════════════════════════════════════════════

version: "2.0.0"
last_updated: "2026-03-22T00:00:00Z"
updated_by: "perf-engineering-team"
environment_name: "PERF"

applications:

  # ── Frontend: OPUS ──────────────────────────────────────────────────

  - app_name: "opus-web"
    app_description: "OPUS Legacy Retail Application (Web HTTP/HTML)"
    tags: ["frontend", "opus", "critical"]
    config_fields:
      - field_name: "CSI_GATEWAY_URL"
        expected_perf_value: "https://csi-perf.internal.att.com:8443"
        inspection_tool: "azure_cli"
        description: "CSI Common Services Gateway endpoint"
        known_qc_values:
          - "https://csi-qc3.internal.att.com:8443"
          - "https://csi-qc2.internal.att.com:8443"
      - field_name: "SESSION_DB"
