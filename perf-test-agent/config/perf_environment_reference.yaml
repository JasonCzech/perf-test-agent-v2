# Legacy single-file reference (deprecated).
#
# Environment references are now stored per application/API under
# config/environment_references and indexed via the manifest file located at:
#   config/environment_references/manifest.yaml
#
# This file remains only as documentation of the previous structure.
legacy_version: "2.0.0"
notes: |
  Update config/environment_references/manifest.yaml to add, remove, or edit
  application-specific references. Each application/environment pair has its
  own YAML file under config/environment_references/<app>/<environment>.yaml.
  The EnvConfigAgent and Web UI load configs through the manifest-aware store.
