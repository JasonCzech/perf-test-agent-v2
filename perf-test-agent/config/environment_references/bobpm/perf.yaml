version: "2.0.0"
last_updated: "2026-03-23T00:00:00Z"
updated_by: "perf-engineering-team"
environment_name: "PERF"
lab_environment: "PERF"
release_code: "current"
application_key: "bobpm"
application_display_name: "BOBPM (Business Order BPM)"
api_variant: "core"
applications:
  - app_name: "bobpm"
    app_description: "BOBPM — Business Order Business Process Management engine"
    tags: ["middleware", "bpm", "order", "critical"]
    config_fields:
      - field_name: "BOBPM_BASE_URL"
        expected_perf_value: "https://bobpm-perf.internal.att.com:8443"
        inspection_tool: "http_probe"
        description: "BOBPM REST API base URL"
        known_qc_values:
          - "https://bobpm-qc3.internal.att.com:8443"
          - "https://bobpm-qc2.internal.att.com:8443"
      - field_name: "BOBPM_HEALTH_ENDPOINT"
        expected_perf_value: "https://bobpm-perf.internal.att.com:8443/bobpm/actuator/health"
        inspection_tool: "http_probe"
        description: "BOBPM health check endpoint"
        known_qc_values:
          - "https://bobpm-qc3.internal.att.com:8443/bobpm/actuator/health"
      - field_name: "BOBPM_KAFKA_BOOTSTRAP"
        expected_perf_value: "kafka-perf-01.att.com:9092,kafka-perf-02.att.com:9092"
        inspection_tool: "http_probe"
        description: "Kafka bootstrap servers for BOBPM order events"
        known_qc_values:
          - "kafka-qc-01.att.com:9092,kafka-qc-02.att.com:9092"
      - field_name: "BOBPM_DB_CONNECTION"
        expected_perf_value: "oracle-perf-scan.att.com:1521/BOBPM_PERF"
        inspection_tool: "db_query"
        description: "BOBPM Oracle database for process state"
        known_qc_values:
          - "oracle-qc-scan.att.com:1521/BOBPM_QC3"
      - field_name: "BOBPM_REPLICA_COUNT"
        expected_perf_value: "3"
        inspection_tool: "kubernetes_api"
        description: "AKS replica count for BOBPM pods"
        known_qc_values:
          - "1"
          - "2"
      - field_name: "BOBPM_NEO_ENDPOINT"
        expected_perf_value: "https://neo-perf.internal.att.com:8443"
        inspection_tool: "azure_cli"
        description: "Downstream NEO endpoint used by BOBPM"
        known_qc_values:
          - "https://neo-qc3.internal.att.com:8443"
