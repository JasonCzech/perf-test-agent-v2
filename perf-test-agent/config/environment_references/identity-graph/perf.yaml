        known_qc_values:
          - "https://identity-graph-qc3.internal.att.com:8080"
          - "https://identity-graph-qc2.internal.att.com:8080"
      - field_name: "IDENTITY_GRAPH_SOLR_URL"
        expected_perf_value: "https://identity-graph-perf.internal.att.com:8983/solr"
        inspection_tool: "http_probe"
        description: "Identity Graph SOLr collection endpoint"
        known_qc_values:
          - "https://identity-graph-qc3.internal.att.com:8983/solr"
      - field_name: "IDENTITY_GRAPH_SOLR_COLLECTION"
        expected_perf_value: "identity_perf"
        inspection_tool: "http_probe"
        description: "SOLr collection name for identity data"
        known_qc_values:
          - "identity_qc3"
          - "identity_qc2"
      - field_name: "IDENTITY_GRAPH_REPLICA_COUNT"
        expected_perf_value: "3"
        inspection_tool: "kubernetes_api"
        description: "AKS replica count for Identity Graph pods"
        known_qc_values:
