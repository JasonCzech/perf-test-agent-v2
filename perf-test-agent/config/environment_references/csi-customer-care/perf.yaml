        description: "CSI Customer Care health check endpoint"
        known_qc_values:
          - "https://csi-cc-qc3.internal.att.com:9443/csi/cc/health"
      - field_name: "CSI_CC_IDENTITY_GRAPH_ENDPOINT"
        expected_perf_value: "https://identity-graph-perf.internal.att.com:8080"
        inspection_tool: "azure_cli"
        description: "Identity Graph endpoint for customer lookup"
        known_qc_values:
          - "https://identity-graph-qc3.internal.att.com:8080"
      - field_name: "CSI_CC_TLG_ENDPOINT"
        expected_perf_value: "https://tlg-perf.internal.att.com:9443"
        inspection_tool: "azure_cli"
